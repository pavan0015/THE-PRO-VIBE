<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE PAVAN CLOTHING CO.</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #070708;
            --matrix-green: #00ff66;
            --matrix-glow: rgba(0, 255, 102, 0.3);
            --panel-bg: rgba(13, 15, 13, 0.95);
            --card-bg: rgba(20, 24, 20, 0.6);
            --border-color: #1a3a21;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #0d2212 0%, #070708 80%);
        }

        /* ---------------- HEADER & NAVIGATION ---------------- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            background: rgba(7, 7, 8, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* Hamburger Trigger Button */
        #menu-trigger-btn {
            background: none;
            border: none;
            color: var(--matrix-green);
            font-size: 24px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #menu-trigger-btn:hover {
            text-shadow: 0 0 10px var(--matrix-green);
        }

        /* Left Sliding Sidebar */
        #left-sidebar-navigation-panel {
            position: fixed;
            top: 0;
            left: -320px;
            width: 300px;
            height: 100vh;
            background: var(--panel-bg);
            border-right: 2px solid var(--matrix-green);
            z-index: 999;
            transition: transform 0.4s cubic-bezier(0.77, 0.2, 0.05, 1.0);
            padding: 30px 20px;
            box-shadow: 5px 0 30px rgba(0, 255, 102, 0.1);
            display: flex;
            flex-direction: column;
        }

        #left-sidebar-navigation-panel.active {
            transform: translateX(320px);
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .sidebar-header h3 {
            color: var(--matrix-green);
            font-size: 18px;
            letter-spacing: 2px;
        }

        .close-sidebar-btn {
            background: none;
            border: none;
            color: #ff3b3b;
            font-size: 20px;
            cursor: pointer;
        }

        .sidebar-links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .sidebar-links a, .sidebar-links button {
            display: flex;
            align-items: center;
            gap: 15px;
            color: #ffffff;
            text-decoration: none;
            font-size: 16px;
            padding: 12px 15px;
            border-radius: 4px;
            border: 1px solid transparent;
            background: none;
            width: 100%;
            text-align: left;
            cursor: pointer;
            transition: 0.3s;
        }

        .sidebar-links a:hover, .sidebar-links button:hover {
            background: rgba(0, 255, 102, 0.05);
            border-color: var(--matrix-green);
            color: var(--matrix-green);
            padding-left: 20px;
        }

        .sidebar-links i {
            width: 20px;
            text-align: center;
        }

        .logo h1 {
            font-size: 20px;
            letter-spacing: 3px;
            color: #fff;
            text-shadow: 0 0 5px rgba(255,255,255,0.5);
        }

        .logo span {
            color: var(--matrix-green);
            text-shadow: 0 0 10px var(--matrix-green);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .cart-icon-container {
            position: relative;
            cursor: pointer;
            font-size: 22px;
            color: var(--matrix-green);
        }

        .cart-badge {
            position: absolute;
            top: -8px;
            right: -10px;
            background: #ff3b3b;
            color: white;
            font-size: 11px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 5px;
        }

        /* ---------------- CATALOG CONTAINER ---------------- */
        main {
            max-width: 1300px;
            margin: 120px auto 60px;
            padding: 0 20px;
        }

        .section-title {
            text-align: center;
            margin-bottom: 40px;
            font-size: 24px;
            letter-spacing: 4px;
            color: var(--matrix-green);
            text-transform: uppercase;
        }

        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        /* ---------------- PRODUCT CARD ---------------- */
        .product-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: var(--matrix-green);
            box-shadow: 0 5px 20px rgba(0, 255, 102, 0.15);
        }

        .hub-tag {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0, 0, 0, 0.85);
            color: var(--matrix-green);
            border: 1px solid var(--matrix-green);
            padding: 4px 10px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 3px;
            z-index: 2;
        }

        .product-img-wrapper {
            width: 100%;
            height: 340px;
            background: #111;
            overflow: hidden;
            position: relative;
        }

        .product-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .product-card:hover .product-img-wrapper img {
            transform: scale(1.05);
        }

        .product-info {
            padding: 20px;
            background: rgba(10, 12, 10, 0.9);
            border-top: 1px solid var(--border-color);
        }

        .product-title {
            font-size: 16px;
            color: #ffffff;
            margin-bottom: 8px;
            letter-spacing: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .product-desc {
            font-size: 12px;
            color: #888;
            margin-bottom: 15px;
            line-height: 1.4;
            height: 34px;
            overflow: hidden;
        }

        .product-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-price {
            font-size: 18px;
            color: var(--matrix-green);
            font-weight: bold;
        }

        .add-to-cart-btn {
            background: transparent;
            border: 1px solid var(--matrix-green);
            color: var(--matrix-green);
            padding: 8px 14px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
            border-radius: 4px;
        }

        .add-to-cart-btn:hover {
            background: var(--matrix-green);
            color: #000;
            box-shadow: 0 0 10px var(--matrix-green);
            font-weight: bold;
        }

        /* ---------------- PAVAN PANEL CONTROL CENTER ---------------- */
        #pavan-admin-panel {
            position: fixed;
            top: 0;
            right: -420px;
            width: 400px;
            height: 100vh;
            background: var(--panel-bg);
            border-left: 2px solid var(--matrix-green);
            z-index: 1000;
            transition: transform 0.4s ease;
            padding: 30px 20px;
            box-shadow: -5px 0 30px rgba(0,255,102,0.15);
            overflow-y: auto;
        }

        #pavan-admin-panel.active {
            transform: translateX(-420px);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--matrix-green);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .panel-header h2 {
            color: var(--matrix-green);
            font-size: 18px;
            letter-spacing: 2px;
        }

        .close-panel-btn {
            background: none;
            border: none;
            color: #ff3b3b;
            font-size: 22px;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            color: var(--matrix-green);
            font-size: 12px;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 10px;
            border-radius: 4px;
            font-family: monospace;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--matrix-green);
        }

        .inject-btn {
            width: 100%;
            background: transparent;
            border: 1px solid var(--matrix-green);
            color: var(--matrix-green);
            padding: 12px;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 2px;
            transition: 0.3s;
            margin-top: 10px;
        }

        .inject-btn:hover {
            background: var(--matrix-green);
            color: #000;
            box-shadow: 0 0 15px var(--matrix-green);
        }

        /* Responsive */
        @media (max-width: 450px) {
            #pavan-admin-panel {
                width: 100%;
                right: -100%;
            }
            #pavan-admin-panel.active {
                transform: translateX(-100%);
            }
        }
    </style>
</head>
<body>

    <!-- NAV BAR -->
    <header>
        <div class="nav-left">
            <button id="menu-trigger-btn" title="Open Navigation Menu">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div class="logo">
                <h1>THE PAVAN<span> CLOTHING CO.</span></h1>
            </div>
        </div>
        <div class="nav-right">
            <div class="cart-icon-container">
                <i class="fa-solid fa-square-terminal"></i>
                <span class="cart-badge" id="cart-counter-badge">0</span>
            </div>
        </div>
    </header>

    <!-- SLIDING SIDEBAR (LEFT) -->
    <nav id="left-sidebar-navigation-panel">
        <div class="sidebar-header">
            <h3>NAVIGATION</h3>
            <button class="close-sidebar-btn" id="close-nav-sidebar" title="Close Menu">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <div class="sidebar-links">
            <a href="#"><i class="fa-solid fa-house"></i> Home Matrix</a>
            <a href="#"><i class="fa-solid fa-bolt"></i> New Arrivals</a>
            <a href="#"><i class="fa-solid fa-tags"></i> Collections</a>
            <a href="#"><i class="fa-solid fa-user-secret"></i> About Developer</a>
            <hr style="border-color: var(--border-color); margin: 10px 0;">
            <button id="trigger-pavan-panel-btn">
                <i class="fa-solid fa-terminal" style="color: var(--matrix-green);"></i> Pavan Panel
            </button>
        </div>
    </nav>

    <!-- LIVE CATALOG -->
    <main>
        <h2 class="section-title">// SYSTEM_CATALOG_LOADED</h2>
        <div class="catalog-grid" id="main-catalog-grid-display">
            <!-- Products inject transparently here -->
        </div>
    </main>

    <!-- ADVANCED PAVAN CONTROL CENTER PANEL (RIGHT) -->
    <div id="pavan-admin-panel">
        <div class="panel-header">
            <h2>PAVAN CONTROL CENTER v2.4</h2>
            <button class="close-panel-btn" id="close-pavan-admin-btn">&times;</button>
        </div>
        
        <div class="form-group">
            <label>PRODUCT HUB LABEL</label>
            <select id="inj-hub">
                <option value="Oversized Streetwear">Oversized Streetwear</option>
                <option value="Premium Anime Hoodies">Premium Anime Hoodies</option>
                <option value="Baggy Parachute Cargo">Baggy Parachute Cargo</option>
                <option value="Luxury Drop Shoulder">Luxury Drop Shoulder</option>
            </select>
        </div>
        <div class="form-group">
            <label>PRODUCT NAME</label>
            <input type="text" id="inj-name" placeholder="e.g., Cyberpunk Phantom Tee">
        </div>
        <div class="form-group">
            <label>PRICE (INR)</label>
            <input type="number" id="inj-price" placeholder="e.g., 1499">
        </div>
        <div class="form-group">
            <label>PRODUCT IMAGE</label>
            <input type="file" id="inj-img-file" accept="image/*">
            <p style="font-size:10px; color:#666; margin-top:5px;">Or paste image URL below:</p>
            <input type="text" id="inj-img-url" placeholder="https://example.com/image.jpg" style="margin-top:5px;">
        </div>
        <div class="form-group">
            <label>SYSTEM DESCRIPTION</label>
            <textarea id="inj-desc" rows="3" placeholder="Brief technical specs of fabric..."></textarea>
        </div>
        
        <button class="inject-btn" id="execute-injection-btn">UPLOAD & INJECT PRODUCT</button>
    </div>

    <!-- MAIN APP CORE SCRIPT -->
    <script>
        // 1. ALL ORIGINAL DEFAULT PRODUCTS RESTORED
        const DEFAULT_CATALOG = [
            {
                id: 1,
                hubLabel: "Oversized Streetwear",
                name: "Cyber Tokyo Overdrive Tee",
                price: 1299,
                desc: "240 GSM premium heavy-weight loopknit cotton. High-density puff print graphic.",
                img: "https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=500"
            },
            {
                id: 2,
                hubLabel: "Premium Anime Hoodies",
                name: "Gojo Domain Infinite Hoodie",
                price: 2799,
                desc: "400 GSM ultra-soft fleece hoodie. Cyberpunk style graphics with premium embroidery.",
                img: "https://images.unsplash.com/photo-1556821840-3a63f95609a7?w=500"
            },
            {
                id: 3,
                hubLabel: "Baggy Parachute Cargo",
                name: "Tactical Matrix Cargo Pants",
                price: 2199,
                desc: "Water-resistant ripstop fabric. Adjustable ankle toggles with multi-utility tactical pockets.",
                img: "https://images.unsplash.com/photo-1517423568366-8b83523034fd?w=500"
            },
            {
                id: 4,
                hubLabel: "Luxury Drop Shoulder",
                name: "Acid Wash Vintage Aesthetic Tee",
                price: 1499,
                desc: "Custom washed finish giving unique luxury street texture. 100% combed cotton.",
                img: "https://images.unsplash.com/photo-1562157873-818bc0726f68?w=500"
            },
            {
                id: 5,
                hubLabel: "Oversized Streetwear",
                name: "Neon Shinjuku Phantom Tee",
                price: 1399,
                desc: "Glow in the dark premium matrix ink layout. Relaxed streetwear comfort drop fit.",
                img: "https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?w=500"
            },
            {
                id: 6,
                hubLabel: "Premium Anime Hoodies",
                name: "Sukuna Cursed King Cloak Hoodie",
                price: 2899,
                desc: "Deep crimson premium threadwork. Oversized fit with dual drawstrings and metal aglets.",
                img: "https://images.unsplash.com/photo-1620799140408-edc6dcb6d633?w=500"
            }
        ];

        let catalogData = [];
        let cartCount = 0;

        // Dom Elements
        const mainCatalogGrid = document.getElementById('main-catalog-grid-display');
        const menuTriggerBtn = document.getElementById('menu-trigger-btn');
        const leftSidebar = document.getElementById('left-sidebar-navigation-panel');
        const closeNavSidebar = document.getElementById('close-nav-sidebar');
        const pavanAdminPanel = document.getElementById('pavan-admin-panel');
        const triggerPavanPanelBtn = document.getElementById('trigger-pavan-panel-btn');
        const closePavanAdminBtn = document.getElementById('close-pavan-admin-btn');
        const cartCounterBadge = document.getElementById('cart-counter-badge');

        // Initialize App Database
        function initDatabase() {
            const savedData = localStorage.getItem('pavan_custom_catalog');
            if (savedData) {
                catalogData = JSON.parse(savedData);
            } else {
                catalogData = [...DEFAULT_CATALOG];
                localStorage.setItem('pavan_custom_catalog', JSON.stringify(catalogData));
            }
            renderCatalog();
        }

        // Render Cards to Grid UI
        function renderCatalog() {
            mainCatalogGrid.innerHTML = '';
            catalogData.forEach(prod => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <span class="hub-tag">${prod.hubLabel}</span>
                    <div class="product-img-wrapper">
                        <img src="${prod.img}" alt="${prod.name}" onerror="this.src='https://images.unsplash.com/photo-1578932750294-f5075e85f44a?w=500'">
                    </div>
                    <div class="product-info">
                        <h4 class="product-title">${prod.name}</h4>
                        <p class="product-desc">${prod.desc || 'No system description provided for this premium streetwear product.'}</p>
                        <div class="product-meta">
                            <span class="product-price">₹${prod.price}</span>
                            <button class="add-to-cart-btn" onclick="addToCartTrigger()">ADD TO CART</button>
                        </div>
                    </div>
                `;
                mainCatalogGrid.appendChild(card);
            });
        }

        // Add To Cart Dummy Logic
        function addToCartTrigger() {
            cartCount++;
            cartCounterBadge.textContent = cartCount;
            alert("Product synchronized to virtual cart buffer successfully!");
        }

        // --- SIDEBARS TOGGLE LOGIC ---
        menuTriggerBtn.addEventListener('click', () => {
            leftSidebar.classList.add('active');
        });

        closeNavSidebar.addEventListener('click', () => {
            leftSidebar.classList.remove('active');
        });

        triggerPavanPanelBtn.addEventListener('click', () => {
            leftSidebar.classList.remove('active'); // Close left menu first
            const accessKey = prompt("ENTER PAVAN PANEL ENCRYPTION ACCESS KEY:");
            if (accessKey === 'pavan') {
                pavanAdminPanel.classList.add('active');
            } else {
                alert("ACCESS DENIED: INVALID SYSTEM ENCRYPTION KEY!");
            }
        });

        closePavanAdminBtn.addEventListener('click', () => {
            pavanAdminPanel.classList.remove('active');
        });

        // --- PRODUCT INJECTION LOGIC ---
        const executeBtn = document.getElementById('execute-injection-btn');
        executeBtn.addEventListener('click', () => {
            const hub = document.getElementById('inj-hub').value;
            const name = document.getElementById('inj-name').value.trim();
            const price = document.getElementById('inj-price').value.trim();
            const desc = document.getElementById('inj-desc').value.trim();
            const fileInput = document.getElementById('inj-img-file');
            const urlInput = document.getElementById('inj-img-url').value.trim();

            if (!name || !price) {
                alert("Failed: Product Name & Price are critical system requirements!");
                return;
            }

            let finalImg = "https://images.unsplash.com/photo-1578932750294-f5075e85f44a?w=500"; // fallback

            const completeInjection = () => {
                const newProduct = {
                    id: Date.now(),
                    hubLabel: hub,
                    name: name,
                    price: parseInt(price),
                    desc: desc,
                    img: finalImg
                };

                catalogData.unshift(newProduct); // Add dynamic item to top of list
                localStorage.setItem('pavan_custom_catalog', JSON.stringify(catalogData));
                renderCatalog();
                
                // Clear Fields
                document.getElementById('inj-name').value = '';
                document.getElementById('inj-price').value = '';
                document.getElementById('inj-desc').value = '';
                fileInput.value = '';
                document.getElementById('inj-img-url').value = '';
                
                pavanAdminPanel.classList.remove('active');
                alert("SUCCESS: New custom product injected into primary catalog array!");
            };

            // Process image file or text URL
            if (fileInput.files && fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    finalImg = e.target.result;
                    completeInjection();
                }
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                if (urlInput) finalImg = urlInput;
                completeInjection();
            }
        });

        // Run on Startup
        window.addEventListener('DOMContentLoaded', initDatabase);
    </script>
</body>
</html>
